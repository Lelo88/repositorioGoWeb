{{template "base" .}}

{{define "title"}} RPS web - Inicio {{end}}

{{define "content"}}

<section class="container py-5">
    <h1 class="display-4 fw-bold py-3 text-center">Bienvenido a la página de inicio</h1>
    <div class="row">
        <div class="col-md-4 mx-auto">
            <img src="/static/img/rock_icon.png" alt="rock-icon" class="img-fluid">
        </div>
        <div class="col-md-4 mx-auto">
            <img src="/static/img/paper_icon.png" alt="paper-icon" class="img-fluid">
        </div>
        <div class="col-md-4 mx-auto">
            <img src="/static/img/scissors_icon.png" alt="scissors-icon" class="img-fluid">
        </div>
    </div>
    <p class="lead text-center fs-2 py-4">Juega contra la computadora</p>
    <p class="text-center">
        <a href="/new-game" class="btn btn-success btn-lg mx-2">Nuevo Juego</a>
    </p>
</section>
<section class="container py-5">
    <h2 class="mb-4">
        ¿Cómo jugar?
    </h2>
    <ol class="list-group list-group-numbered">
        <li class="list-group-item">Crear una nueva partida.</li>
        <li class="list-group-item">Ingrese su nombre</li>
        <li class="list-group-item">Empezar a jugar</li>
    </ol>
</section>
{{end}}
