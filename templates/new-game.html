{{template "base" .}}

{{define "title"}} RPS web - Nuevo Juego  {{end}}

{{define "content"}}
<section>
    <div class="container">
        <div class="row">
            <h2 class="text-center py-4">
                Ingrese su nombre
            </h2>
            <form action="/game" method="post" class="mx-auto" style="max-width: 400px;">
                <div class="mb-3">
                    <input type="text" name="name" id="playerName" class="form-control" placeholder="Ingresa tu nombre" required>
                </div>
                <div class="d-grid gap-2 py-4">
                    <button type="submit" class="btn btn-success btn-lg">Comenzar Juego</button>
                </div>
            </form>
        </div>
    </div>
</section>
{{end}}
